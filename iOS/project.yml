name: Punchcard
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Punchcard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Punchcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.punchcardlog
        DEVELOPMENT_TEAM: W7Q885Q59C
        INFOPLIST_FILE: Punchcard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: Punchcard/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Punchcard - Loyalty Log
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Punchcard/Punchcard.entitlements
      properties: {}
  PunchcardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PunchcardTests
    dependencies:
      - target: Punchcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.punchcardlog.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  PunchcardUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PunchcardUITests
    dependencies:
      - target: Punchcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.punchcardlog.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Punchcard:
    build:
      targets:
        Punchcard: all
    test:
      targets:
        - PunchcardTests
        - PunchcardUITests
    run:
      config: Debug
